version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"
    networks:
      - ocr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend + Nginx proxy ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr_frontend
    restart: unless-stopped
    ports:
      - "8019:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ocr_net

volumes:
  uploads_data:
    driver: local

networks:
  ocr_net:
    driver: bridge
