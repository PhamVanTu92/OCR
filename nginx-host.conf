# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/sites-available/ocr
# Host-level Nginx – nhận request từ Internet, forward vào Docker (port 8019)
#
# Sau khi copy file này:
#   sudo ln -s /etc/nginx/sites-available/ocr /etc/nginx/sites-enabled/ocr
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;                # ← thay domain thực tế

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;              # certbot webroot
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;               # ← thay domain thực tế

    # ── SSL (Let's Encrypt) ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin"        always;
    add_header X-XSS-Protection       "1; mode=block"        always;

    # ── Upload tối đa 20 MB ───────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Proxy vào Docker container ────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8019;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeout cao hơn cho OCR processing
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }
}
